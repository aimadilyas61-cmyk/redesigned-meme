<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الدودة</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            color: white;
        }

        h1 {
            color: #00ff88;
            margin: 10px;
        }

        #score {
            font-size: 24px;
            margin: 10px;
            color: #00ff88;
        }

        #gameBoard {
            border: 4px solid #00ff88;
            background: #0d0d0d;
            box-shadow: 0 0 20px #00ff88;
        }

       .controls {
            margin-top: 15px;
            text-align: center;
        }

        button {
            background: #00ff88;
            color: black;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }

        button:active {
            background: #00cc6a;
        }

       .arrow-btns {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            margin-top: 10px;
            justify-content: center;
        }

       .arrow-btns button {
            padding: 15px;
            font-size: 20px;
        }

        #upBtn { grid-column: 2; }
        #leftBtn { grid-column: 1; grid-row: 2; }
        #rightBtn { grid-column: 3; grid-row: 2; }
        #downBtn { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>
    <h1>🐍 لعبة الدودة</h1>
    <div id="score">النقاط: 0</div>
    <canvas id="gameBoard" width="400" height="400"></canvas>

    <div class="controls">
        <button onclick="startGame()">بدا / عاود</button>
        <div class="arrow-btns">
            <button id="upBtn" onclick="changeDirection('up')">⬆️</button>
            <button id="leftBtn" onclick="changeDirection('left')">⬅️</button>
            <button id="rightBtn" onclick="changeDirection('right')">➡️</button>
            <button id="downBtn" onclick="changeDirection('down')">⬇️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameRunning = false;
        let gameLoop;

        function startGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            scoreText.textContent = 'النقاط: 0';
            generateFood();
            gameRunning = true;

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100); // السرعة هنا
        }

        function update() {
            if (!gameRunning) return;

            // حرك الراس
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // تصادم مع الحيط
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // تصادم مع الجسم
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // كلا الماكلة؟
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreText.textContent = 'النقاط: ' + score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // مسح الشاشة
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الماكلة
            ctx.fillStyle = '#ff3838';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // رسم الدودة
            ctx.fillStyle = '#00ff88';
            snake.forEach((segment, index) => {
                if (index === 0) ctx.fillStyle = '#00ffaa'; // الراس
                else ctx.fillStyle = '#00ff88';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // تأكد ما تجيش فوق الدودة
            for (let segment of snake) {
                if (food.x === segment.x && food.y === segment.y) {
                    generateFood();
                    return;
                }
            }
        }

        function changeDirection(direction) {
            if (!gameRunning) return;

            if (direction === 'up' && dy === 0) {
                dx = 0; dy = -1;
            }
            if (direction === 'down' && dy === 0) {
                dx = 0; dy = 1;
            }
            if (direction === 'left' && dx === 0) {
                dx = -1; dy = 0;
            }
            if (direction === 'right' && dx === 0) {
                dx = 1; dy = 0;
            }
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            alert('انتهت اللعبة! النقاط ديالك: ' + score);
        }

        // تحكم بالكيبورد للكمبيوتر
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') changeDirection('up');
            if (e.key === 'ArrowDown') changeDirection('down');
            if (e.key === 'ArrowLeft') changeDirection('left');
            if (e.key === 'ArrowRight') changeDirection('right');
            if (e.key === ' ') startGame();
        });

        draw(); // رسم أولي
    </script>
</body>
</html>
